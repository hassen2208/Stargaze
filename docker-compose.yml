

services:

  backend:
    build: ./backend
    container_name: stargaze_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

      # Firebase
      - ./backend/app/firebase/stargaze-7f6bf-firebase-adminsdk-fbsvc-3eeb963ee6.json:/app/app/firebase/stargaze-7f6bf-firebase-adminsdk-fbsvc-3eeb963ee6.json

    env_file:
      - ./backend/.env

    depends_on:
      - db

  frontend:
    build: ./frontend_stargaze
    container_name: stargaze_frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend_stargaze:/app
      - /app/node_modules

    depends_on:
      - backend

  db:
    image: postgres:16

    container_name: stargaze_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stargaze_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: